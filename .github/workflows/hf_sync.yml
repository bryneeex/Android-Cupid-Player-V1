name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Hanya mengirim isi folder server ke Hugging Face
          git push --force https://centyy:$HF_TOKEN@huggingface.co/spaces/centyy/Cupid-Player-Api `git subtree split --prefix server main`:main
